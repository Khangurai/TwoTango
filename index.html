<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwoTango - Couple Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-pink-100 p-4">
    <div class="container mx-auto max-w-3xl bg-white p-6 rounded-lg shadow-md">
      <h1 class="text-3xl font-bold text-center text-pink-600 mb-6">
        TwoTango
      </h1>
      <div class="flex justify-center mb-6">
        <button
          id="expense-tab"
          class="px-4 py-2 mx-2 rounded-md bg-pink-400 text-white font-medium active-tab hover:bg-pink-700""
          onclick="showSection('expense')"
        >
          Expenses
        </button>
        <button
          id="map-tab"
          class="px-4 py-2 mx-2 rounded-md bg-pink-400 text-white font-medium hover:bg-pink-700""
          onclick="showSection('map')"
        >
          Map
        </button>
      </div>

      <!-- Expense Tracker Section -->
      <div id="expense-section" class="section">
        <h2 class="text-xl font-semibold text-pink-600 mb-4">
          Expense Tracker
        </h2>
        <form
          id="expense-form"
          class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4"
        >
          <input
            type="text"
            id="expense-desc"
            class="col-span-1 md:col-span-2 p-2 border border-gray-300 rounded-md"
            placeholder="Description"
            required
          />
          <input
            type="number"
            id="expense-amount"
            class="col-span-1 p-2 border border-gray-300 rounded-md"
            placeholder="Amount"
            step="0.01"
            required
          />
          <input
            type="date"
            id="expense-date"
            class="col-span-1 p-2 border border-gray-300 rounded-md"
            required
          />
          <select
            id="expense-category"
            class="col-span-1 p-2 border border-gray-300 rounded-md"
          >
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Other">Other</option>
          </select>
          <button
            type="submit"
            class="col-span-1 md:col-span-1 bg-pink-600 text-white p-2 rounded-md hover:bg-pink-700"
          >
            Add
          </button>
        </form>
        <ul id="expense-list" class="space-y-2 mb-4"></ul>
        <p class="font-bold text-pink-600">
          Total: $<span id="expense-total">0.00</span>
        </p>
      </div>

      <!-- Map Tracker Section -->
      <div id="map-section" class="section hidden">
        <h2 class="text-xl font-semibold text-pink-600 mb-4">Map Tracker</h2>
        <form
          id="place-form"
          class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-4"
        >
          <input
            type="text"
            id="place-name"
            class="col-span-1 md:col-span-2 p-2 border border-gray-300 rounded-md"
            placeholder="Place Name"
            required
          />
          <input
            type="text"
            id="place-note"
            class="col-span-1 md:col-span-2 p-2 border border-gray-300 rounded-md"
            placeholder="Note"
            required
          />
          <input
            type="number"
            id="place-lat"
            class="col-span-1 p-2 border border-gray-300 rounded-md"
            placeholder="Latitude"
            step="any"
            required
          />
          <input
            type="number"
            id="place-lng"
            class="col-span-1 p-2 border border-gray-300 rounded-md"
            placeholder="Longitude"
            step="any"
            required
          />
          <button
            type="submit"
            class="col-span-1 md:col-span-1 bg-pink-600 text-white p-2 rounded-md hover:bg-pink-700"
          >
            Add
          </button>
        </form>
        <div id="map" class="h-96 mb-4"></div>
        <ul id="place-list" class="space-y-2"></ul>
      </div>
    </div>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
