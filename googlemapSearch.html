<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Map Search</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      #map {
        height: 300px;
        width: 100%;
      }
    </style>
  </head>
  <body class="p-4">
    <div class="container">
      <h3>Search Place & Show on Map</h3>
      <input
        id="searchInput"
        class="form-control mb-3"
        type="text"
        placeholder="Search location..."
      />
      <div id="map"></div>
    </div>

    <script>
      let map;
      let marker;

      function initMap() {
        const defaultLocation = { lat: 16.8661, lng: 96.1951 }; // Yangon

        map = new google.maps.Map(document.getElementById("map"), {
          center: defaultLocation,
          zoom: 13,
        });

        const input = document.getElementById("searchInput");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.bindTo("bounds", map);

        // Clear input when clicked
        input.addEventListener("click", () => {
          input.value = "";
        });

        autocomplete.addListener("place_changed", () => {
          const place = autocomplete.getPlace();
          if (!place.geometry) {
            alert("No details available for input: '" + place.name + "'");
            return;
          }

          map.setCenter(place.geometry.location);
          map.setZoom(15);

          if (marker) marker.setMap(null);

          marker = new google.maps.Marker({
            map: map,
            position: place.geometry.location,
          });
        });
      }
    </script>

    <!-- Replace YOUR_API_KEY_HERE with your actual key -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC8eYe7VhkEWSY5bHZQK13KYGNKZ0dIX-g&libraries=places&callback=initMap"
      async
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
